services:

  mysql:
    image: mysql:8.0
    container_name: connectbe_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    ports:
      - "3307:3306"    # 3306 déjà utilisé par un autre conteneur MySQL
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/seeds/wellness.sql:/docker-entrypoint-initdb.d/02_wellness.sql
      - ./database/seeds/poi.sql:/docker-entrypoint-initdb.d/03_poi.sql
      - ./database/seeds/events.sql:/docker-entrypoint-initdb.d/04_events.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - connectbe_net

  redis:
    image: redis:7-alpine
    container_name: connectbe_redis
    restart: unless-stopped
    ports:
      - "6380:6379"    # 6379 déjà pris — exposé sur 6380 pour le dev local
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - connectbe_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: connectbe_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "4001:4000"    # 4000 déjà utilisé
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/src:/app/src
      - ./uploads:/uploads          # fichiers uploadés (logos, images POI…)
      - /app/node_modules
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - connectbe_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: connectbe_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"    # Vite écoute sur 5173 dans le conteneur
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src          # hot-reload du code source
      - ./frontend/vite.config.js:/app/vite.config.js   # hot-reload config Vite
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - /app/node_modules                # préserve les node_modules du container
    environment:
      - VITE_API_PROXY=http://backend:4000
      - VITE_HOTEL_LAT=${HOTEL_LAT}
      - VITE_HOTEL_LNG=${HOTEL_LNG}
      - VITE_HOTEL_NAME=${HOTEL_NAME}
      - VITE_IDLE_TIMEOUT_MS=${IDLE_TIMEOUT_MS}
    networks:
      - connectbe_net

volumes:
  mysql_data:
  redis_data:

networks:
  connectbe_net:
    driver: bridge
